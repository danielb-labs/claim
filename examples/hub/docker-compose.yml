# A minimal compose example that boots the packaged `claim-hub` image against an EMPTY
# mounted volume, proving the self-host "boots from empty" guarantee: point the hub at a
# fresh directory and it creates and migrates its own SQLite database on first boot, then
# serves /status truthfully (head 0 / version 0 until a sync and ingest populate it).
#
# The image is built from the repository's Dockerfile — a small musl-static binary plus
# `git` (registry sync) and CA certs (the JWKS TLS fetch). `build: ../..` builds it from
# source the first time; once you have pushed it to a registry, replace the whole `build:`
# block with `image: <your-registry>/claim-hub:<tag>` and the compose file needs no repo
# checkout at all — the ownership story is identical either way.
#
# Run it from the repository root:
#
#     docker compose -f examples/hub/docker-compose.yml up --build
#
# then, from another shell:
#
#     curl -s http://127.0.0.1:8080/status
#     # => {"ledger_head":0,"registry_version":0,"rejection_count":0}
#
# The `hub-data` volume holds `hub.db`. Back up a *running* hub with SQLite's online backup
# from the host (`sqlite3 <volume>/hub.db ".backup '/backups/hub.db'"`) — a `docker compose
# cp` of a live `hub.db` alone drops the WAL and loses the ledger tail. Delete the whole hub
# by removing the volume (`docker compose down -v`); there is no database server the product
# runs on your behalf (HUB.md §1). See docs/hub.md for the full ownership story.

services:
  hub:
    # Build the packaged image from the repository's Dockerfile. Swap this whole `build:`
    # block for `image: your-registry/claim-hub:tag` to run a prebuilt, pushed image with
    # no source checkout — the data-ownership story is the same either way.
    build:
      context: ../..
      dockerfile: Dockerfile
    image: claim-hub:local
    # The image already sets CLAIM_HUB_LISTEN=0.0.0.0:8080 and CLAIM_HUB_DATABASE=/data/hub.db
    # (see the Dockerfile), so the container binds a reachable address and lands its database
    # on the mounted volume with no config file at all. Repeating CLAIM_HUB_DATABASE here
    # documents where the one owned file lives; binding 0.0.0.0 is safe because only the
    # mapped port below is exposed.
    #
    # CLAIM_HUB_OPEN_READS=true is the explicit read-auth decision for this LOCAL DEMO: the
    # hub is secure by default and will NOT boot without a read-auth decision, so this opts
    # into open (unauthenticated) reads — appropriate only because this compose file binds to
    # loopback (127.0.0.1 below). For a real deployment, drop the open-reads flag and mount a
    # hub.toml with a [read_auth.issuer] (an OAuth 2.1 IdP) or [[read_auth.tokens]] (run
    # `claim-hub mint-token`) instead. See docs/hub.md → Read authentication.
    environment:
      CLAIM_HUB_DATABASE: "/data/hub.db"
      CLAIM_HUB_OPEN_READS: "true"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      # The one file the customer owns. Starts EMPTY — the hub creates hub.db here on first
      # boot (no config file needed: the image's CLAIM_HUB_* env overrides drive a config-less
      # boot). This is what makes "boots from an empty mounted volume" literally true. Back up
      # a *running* hub with SQLite's online backup from the HOST against this volume's file
      # (`sqlite3 <volume>/hub.db ".backup '/backups/hub.db'"`), NOT `docker compose cp
      # hub:/data/hub.db` — copying only hub.db on a live hub drops the WAL and loses the
      # ledger tail. The image ships no sqlite3; run it on the host. See docs/hub.md.
      - hub-data:/data

volumes:
  hub-data:
