# Drop-in clock lane for a repo that has a .claims/ store.
#
# Copy this into your repo's `.github/workflows/`. It calls the claim tool's reusable
# clock workflow on a schedule: it runs your claims' checks and maintains one standing
# "claim: due & drifted" issue — created when there is a queue, updated as it changes,
# closed when the store is clean. This issue is your nag: it turns a drifted or broken
# claim into something a human sees on a schedule. The CLI writes nothing back to the
# store; the verdict stream and the staleness clock belong to a hub, not to this lane.

name: claims (clock)

on:
  schedule:
    # 07:00 UTC daily. Pick a time; the checks are cheap.
    - cron: "0 7 * * *"
  # Allow a manual run from the Actions tab for a first check or a spot audit.
  workflow_dispatch:

jobs:
  claims:
    uses: your-org/claim/.github/workflows/claim-clock.yml@v1
    with:
      claim-repo: your-org/claim
      claim-ref: v1
      codeowners: .github/CODEOWNERS
    # The reusable workflow declares its own least-privilege permissions
    # (contents: read, issues: write); inherit the caller's token.
    permissions:
      contents: read
      issues: write
