name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup toolchain install stable --component rustfmt clippy
      # SHA-pinned (v2.9.1): a mutable tag on the supply chain is the rot this tool
      # exists to prevent. Bump the SHA and the version comment together.
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
      # Runs the exact same gate as scripts/check.sh so local and CI never
      # disagree about what "green" means.
      - run: ./scripts/check.sh
